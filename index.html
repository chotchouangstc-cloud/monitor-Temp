<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA Master Pro - ระบบตกแต่งรูปภาพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: #1e293b;
            scroll-behavior: smooth;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        }

        #canvas-container {
            border: 2px dashed #cbd5e1;
            background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #canvas-container.dragover {
            border-color: var(--primary);
            background-color: rgba(79, 70, 229, 0.05);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="py-8 px-4 sm:px-6">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-10 text-center fade-in">
            <div class="inline-flex items-center justify-center p-3 bg-white rounded-3xl shadow-sm border border-slate-100">
                <div class="p-2 bg-indigo-600 rounded-2xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <span class="px-4 font-black text-xl tracking-tight text-slate-800">SLA MASTER <span class="text-indigo-600 italic">PRO</span></span>
            </div>
        </header>

        <!-- Section 1: Image Editor -->
        <main class="space-y-6 fade-in">
            <div class="glass-panel p-6 sm:p-8 rounded-[2.5rem]">
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
                    <button onclick="addText('กะ A 05.00 - 14.00')" class="group relative overflow-hidden bg-indigo-600 text-white p-4 rounded-2xl transition-all hover:scale-[1.02] active:scale-95 shadow-md">
                        <div class="text-[10px] uppercase font-bold opacity-60 mb-1">Shift A</div>
                        <div class="text-base sm:text-lg font-black">05.00 - 14.00</div>
                    </button>
                    <button onclick="addText('กะ B 14.00 - 23.00')" class="group relative overflow-hidden bg-emerald-600 text-white p-4 rounded-2xl transition-all hover:scale-[1.02] active:scale-95 shadow-md">
                        <div class="text-[10px] uppercase font-bold opacity-60 mb-1">Shift B</div>
                        <div class="text-base sm:text-lg font-black">14.00 - 23.00</div>
                    </button>
                    <button onclick="addText('กะ C 00.00 - 05.00')" class="group relative overflow-hidden bg-slate-700 text-white p-4 rounded-2xl transition-all hover:scale-[1.02] active:scale-95 shadow-md">
                        <div class="text-[10px] uppercase font-bold opacity-60 mb-1">Shift C</div>
                        <div class="text-base sm:text-lg font-black">00.00 - 05.00</div>
                    </button>
                    <button onclick="addText('กะ M 10.00 - 19.00')" class="group relative overflow-hidden bg-rose-500 text-white p-4 rounded-2xl transition-all hover:scale-[1.02] active:scale-95 shadow-md">
                        <div class="text-[10px] uppercase font-bold opacity-60 mb-1">Shift M</div>
                        <div class="text-base sm:text-lg font-black">10.00 - 19.00</div>
                    </button>
                </div>

                <!-- Custom Text Input -->
                <div class="flex flex-col sm:flex-row gap-2 mb-8 items-stretch sm:items-center bg-slate-50/80 p-2.5 rounded-2xl border border-slate-200">
                    <input type="text" id="custom-text-input" placeholder="หรือพิมพ์ข้อความกำหนดเองที่นี่..." class="flex-1 px-4 py-3 rounded-xl border-none bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 shadow-sm text-slate-700 font-medium" onkeypress="if(event.key === 'Enter') applyCustomText()">
                    <button onclick="applyCustomText()" class="px-6 py-3 bg-slate-800 text-white rounded-xl font-bold transition-all hover:bg-slate-900 shadow-sm flex items-center justify-center gap-2 whitespace-nowrap">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                        เพิ่มข้อความ
                    </button>
                </div>

                <div class="flex flex-col lg:flex-row items-center gap-6 pt-6 border-t border-slate-100">
                    <div class="w-full lg:flex-1">
                        <div class="flex gap-4 items-end mb-3">
                            <!-- Color Picker -->
                            <div>
                                <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-2">
                                    สีข้อความ
                                </label>
                                <input type="color" id="text-color" value="#4f46e5" class="w-12 h-8 rounded cursor-pointer border-0 p-0 bg-transparent">
                            </div>
                            
                            <!-- Font Size -->
                            <div class="flex-1">
                                <div class="flex justify-between items-center mb-2">
                                    <label class="text-xs font-black text-slate-500 uppercase tracking-wider flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3M9 11v10M15 11v10M5 11h14M5 15h14" /></svg>
                                        ขนาดอักษร
                                    </label>
                                    <span id="font-size-val" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">80 px</span>
                                </div>
                                <input type="range" id="font-size" min="30" max="250" value="80" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                            </div>

                            <!-- Actions when selected -->
                            <div id="selected-actions" class="hidden gap-2 pb-0.5">
                                <button id="btn-edit-text" class="p-2 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-lg transition-all" title="แก้ไขข้อความ">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                </button>
                                <button id="btn-delete-text" class="p-2 bg-rose-50 text-rose-600 hover:bg-rose-100 rounded-lg transition-all" title="ลบข้อความ">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </div>

                        <div class="mt-2 text-[11px] font-bold text-indigo-500 flex flex-wrap items-center gap-1.5 animate-pulse">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" /></svg>
                            <span>คลิกที่ข้อความเพื่อเลือก/แก้ไข • <span class="text-rose-500">ดับเบิ้ลคลิก</span> เพื่อแก้ไขข้อความด่วน</span>
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-2 w-full lg:w-auto">
                        <button id="btn-file-trigger" class="flex-1 lg:flex-none px-4 py-3 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                            เลือกภาพ
                        </button>
                        <input type="file" id="file-input" class="hidden" accept="image/*">
                        
                        <button id="btn-clear" class="p-3 bg-white border border-slate-200 text-slate-400 hover:text-rose-500 hover:border-rose-100 rounded-xl transition-all" title="ล้างภาพทั้งหมด">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>

                        <button id="btn-copy-img" class="flex-1 lg:px-6 py-3 bg-slate-800 text-white rounded-xl font-bold transition-all hover:bg-slate-900 flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                            คัดลอก
                        </button>
                        <button id="btn-download" class="flex-1 lg:px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold transition-all hover:bg-indigo-700 shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                            บันทึก
                        </button>
                    </div>
                </div>
            </div>

            <!-- Canvas Area -->
            <div id="canvas-container" class="relative rounded-[2.5rem] overflow-hidden bg-white min-h-[450px] flex items-center justify-center shadow-inner group">
                <div id="placeholder-text" class="text-center p-12 transition-all group-hover:scale-105">
                    <div class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6 text-indigo-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    </div>
                    <p class="text-lg font-bold text-slate-400 mb-1">วางรูปภาพที่นี่ (Ctrl+V)</p>
                    <p class="text-slate-300 text-sm">หรือลากไฟล์รูปภาพมาวาง</p>
                </div>
                <canvas id="editor-canvas" class="hidden cursor-crosshair max-w-full h-auto" style="touch-action: none;"></canvas>
            </div>
        </main>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-900 text-white rounded-2xl shadow-2xl opacity-0 transform translate-y-4 transition-all duration-300 pointer-events-none font-bold z-50 flex items-center gap-3">
            <div id="toast-icon" class="w-5 h-5"></div>
            <span id="toast-msg">Success</span>
        </div>

        <!-- Edit Modal -->
        <div id="edit-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/50 backdrop-blur-sm transition-opacity duration-300 opacity-0">
            <div class="bg-white rounded-3xl p-6 w-11/12 max-w-md shadow-2xl transform scale-95 transition-transform duration-300" id="edit-modal-content">
                <h3 class="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                    แก้ไขข้อความ
                </h3>
                <input type="text" id="edit-text-input" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 shadow-sm text-slate-700 font-medium mb-5" onkeypress="if(event.key === 'Enter') saveEditedText()">
                <div class="flex justify-end gap-3">
                    <button onclick="closeEditModal()" class="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:text-slate-700 hover:bg-slate-100 transition-all">ยกเลิก</button>
                    <button onclick="saveEditedText()" class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-md shadow-indigo-200">บันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Core Utilities ---
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-msg').innerText = msg;
            
            icon.innerHTML = isError 
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="text-rose-400"><path d="M6 18L18 6M6 6l12 12" /></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="text-emerald-400"><path d="M5 13l4 4L19 7" /></svg>';

            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }

        // --- Image Editor Logic ---
        const canvas = document.getElementById('editor-canvas');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholder-text');
        const fileInput = document.getElementById('file-input');
        
        // UI Inputs
        const fontSizeInput = document.getElementById('font-size');
        const fontSizeVal = document.getElementById('font-size-val');
        const textColorInput = document.getElementById('text-color');
        const selectedActions = document.getElementById('selected-actions');
        
        let currentImage = null;
        
        // --- Array of Text Objects ---
        let texts = []; 
        let selectedTextIndex = -1;
        
        // Global defaults
        let globalColor = '#4f46e5';
        let globalSize = 80;

        // --- Drag Text State ---
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };

        // Handle File Input
        document.getElementById('btn-file-trigger').onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleImageFile(file);
        };

        window.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    handleImageFile(item.getAsFile());
                }
            }
        });

        const container = document.getElementById('canvas-container');
        container.addEventListener('dragover', (e) => { e.preventDefault(); container.classList.add('dragover'); });
        container.addEventListener('dragleave', () => container.classList.remove('dragover'));
        container.addEventListener('drop', (e) => {
            e.preventDefault();
            container.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) handleImageFile(file);
        });

        function handleImageFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    texts = []; // Reset texts when new image loaded
                    selectedTextIndex = -1;
                    updateSelectionUI();
                    renderCanvas();
                    placeholder.classList.add('hidden');
                    canvas.classList.remove('hidden');
                    showToast("นำเข้าภาพเรียบร้อย");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function addText(text) {
            if (!currentImage) return showToast("กรุณาวางรูปภาพก่อนเพิ่มข้อความ", true);
            
            // ทำให้ข้อความใหม่ที่เพิ่มมาไม่ทับซ้อนกันเป๊ะๆ (คำนวณตำแหน่ง Y ใหม่)
            let newY = canvas.height * 0.05;
            if (texts.length > 0) {
                newY += (texts.length % 5) * (globalSize + 15);
            }

            texts.push({
                text: text,
                x: canvas.width / 2,
                y: newY,
                color: globalColor,
                size: globalSize
            });
            
            selectedTextIndex = texts.length - 1; // Auto select newly added text
            updateSelectionUI();
            renderCanvas();
        }

        function applyCustomText() {
            const input = document.getElementById('custom-text-input');
            const text = input.value.trim();
            if (!text) {
                showToast("กรุณาพิมพ์ข้อความที่ต้องการก่อน", true);
                input.focus();
                return;
            }
            addText(text);
            input.value = ''; // Clear input field
        }

        function updateSelectionUI() {
            if (selectedTextIndex !== -1) {
                selectedActions.classList.remove('hidden');
                selectedActions.classList.add('flex');
                
                // Sync current selected text properties to UI
                globalSize = texts[selectedTextIndex].size;
                fontSizeInput.value = globalSize;
                fontSizeVal.innerText = `${globalSize} px`;
                
                globalColor = texts[selectedTextIndex].color;
                textColorInput.value = globalColor;
            } else {
                selectedActions.classList.add('hidden');
                selectedActions.classList.remove('flex');
            }
        }

        // --- Handle Settings Updates ---
        textColorInput.oninput = (e) => {
            globalColor = e.target.value;
            if (selectedTextIndex !== -1) {
                texts[selectedTextIndex].color = globalColor;
                renderCanvas();
            }
        };

        fontSizeInput.oninput = (e) => {
            globalSize = parseInt(e.target.value);
            fontSizeVal.innerText = `${globalSize} px`;
            if (selectedTextIndex !== -1) {
                texts[selectedTextIndex].size = globalSize;
                renderCanvas();
            }
        };

        function renderCanvas() {
            if (!currentImage) return;
            canvas.width = currentImage.width;
            canvas.height = currentImage.height;
            ctx.drawImage(currentImage, 0, 0);

            texts.forEach((t, i) => {
                ctx.font = `800 ${t.size}px Sarabun, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                
                // Stroke (Shadow Effect)
                ctx.strokeStyle = 'white';
                ctx.lineWidth = t.size * 0.18;
                ctx.lineJoin = 'round';
                ctx.strokeText(t.text, t.x, t.y);

                // Fill
                ctx.fillStyle = t.color; 
                ctx.fillText(t.text, t.x, t.y);

                // Draw Selection Box
                if (i === selectedTextIndex) {
                    const metrics = ctx.measureText(t.text);
                    const w = metrics.width;
                    const h = t.size;
                    
                    ctx.save();
                    ctx.strokeStyle = 'rgba(79, 70, 229, 0.8)'; // Indigo color
                    ctx.lineWidth = Math.max(3, canvas.width * 0.003);
                    ctx.setLineDash([15, 10]);
                    ctx.strokeRect(t.x - w/2 - 20, t.y - 15, w + 40, h + 30);
                    ctx.restore();
                }
            });
        }

        document.getElementById('btn-clear').onclick = () => {
            currentImage = null; 
            texts = [];
            selectedTextIndex = -1;
            updateSelectionUI();
            canvas.classList.add('hidden'); placeholder.classList.remove('hidden');
            showToast("ล้างข้อมูลแล้ว");
        };

        // --- Edit and Delete Actions ---
        const editModal = document.getElementById('edit-modal');
        const editModalContent = document.getElementById('edit-modal-content');
        const editTextInput = document.getElementById('edit-text-input');

        function promptEditText() {
            if (selectedTextIndex === -1) return;
            editTextInput.value = texts[selectedTextIndex].text;
            
            // Show custom modal instead of window.prompt
            editModal.classList.remove('hidden');
            editModal.classList.add('flex');
            // Timeout to allow display:flex to apply before transitioning opacity
            setTimeout(() => {
                editModal.classList.remove('opacity-0');
                editModalContent.classList.remove('scale-95');
                editTextInput.focus();
            }, 10);
        }

        function closeEditModal() {
            editModal.classList.add('opacity-0');
            editModalContent.classList.add('scale-95');
            setTimeout(() => {
                editModal.classList.add('hidden');
                editModal.classList.remove('flex');
            }, 300);
        }

        function saveEditedText() {
            if (selectedTextIndex === -1) return;
            const newText = editTextInput.value.trim();
            
            if (newText === "") {
                deleteSelectedText();
            } else {
                texts[selectedTextIndex].text = newText;
                renderCanvas();
                showToast("อัปเดตข้อความแล้ว");
            }
            closeEditModal();
        }

        function deleteSelectedText() {
            if (selectedTextIndex === -1) return;
            texts.splice(selectedTextIndex, 1);
            selectedTextIndex = -1;
            updateSelectionUI();
            renderCanvas();
            showToast("ลบข้อความแล้ว");
        }

        document.getElementById('btn-edit-text').onclick = promptEditText;
        document.getElementById('btn-delete-text').onclick = deleteSelectedText;

        // --- Drag Text Implementation ---
        function getCanvasPos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX = evt.clientX;
            let clientY = evt.clientY;
            
            if (evt.touches && evt.touches.length > 0) {
                clientX = evt.touches[0].clientX;
                clientY = evt.touches[0].clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function getHitText(pos) {
            // Loop backwards to hit the top-most text
            for (let i = texts.length - 1; i >= 0; i--) {
                const t = texts[i];
                ctx.font = `800 ${t.size}px Sarabun, sans-serif`;
                const metrics = ctx.measureText(t.text);
                const w = metrics.width;
                const h = t.size;
                
                const pad = 30; // Hitbox padding
                const left = t.x - (w / 2) - pad;
                const right = t.x + (w / 2) + pad;
                const top = t.y - pad;
                const bottom = t.y + h + pad;

                if (pos.x >= left && pos.x <= right && pos.y >= top && pos.y <= bottom) {
                    return i;
                }
            }
            return -1;
        }

        function startDrag(e) {
            if (texts.length === 0) return;
            const pos = getCanvasPos(e);
            const hitIdx = getHitText(pos);
            
            if (hitIdx !== -1) {
                isDragging = true;
                selectedTextIndex = hitIdx; // Select the text
                updateSelectionUI();

                dragOffset.x = texts[hitIdx].x - pos.x;
                dragOffset.y = texts[hitIdx].y - pos.y;
                canvas.style.cursor = 'grabbing';
            } else {
                // Deselect if clicked outside
                if (selectedTextIndex !== -1) {
                    selectedTextIndex = -1;
                    updateSelectionUI();
                }
            }
            renderCanvas();
        }

        function doDrag(e) {
            if (texts.length === 0) return;
            const pos = getCanvasPos(e);
            
            if (!isDragging) {
                canvas.style.cursor = getHitText(pos) !== -1 ? 'grab' : 'crosshair';
                return;
            }

            if (e.type.startsWith('touch')) {
                e.preventDefault(); // ป้องกันหน้าจอเลื่อนเวลาลากข้อความในมือถือ
            }

            if (selectedTextIndex !== -1) {
                texts[selectedTextIndex].x = pos.x + dragOffset.x;
                texts[selectedTextIndex].y = pos.y + dragOffset.y;
                renderCanvas();
            }
        }

        function stopDrag() {
            isDragging = false;
            canvas.style.cursor = 'crosshair';
        }

        canvas.addEventListener('mousedown', startDrag);
        canvas.addEventListener('mousemove', doDrag);
        canvas.addEventListener('mouseup', stopDrag);
        canvas.addEventListener('mouseleave', stopDrag);
        
        // Double Click to Edit
        canvas.addEventListener('dblclick', (e) => {
            const pos = getCanvasPos(e);
            const hitIdx = getHitText(pos);
            if (hitIdx !== -1) {
                selectedTextIndex = hitIdx;
                updateSelectionUI();
                promptEditText();
            }
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            if (getHitText(getCanvasPos(e)) !== -1) {
                e.preventDefault(); 
            }
            startDrag(e);
        }, { passive: false });
        canvas.addEventListener('touchmove', doDrag, { passive: false });
        canvas.addEventListener('touchend', stopDrag);
        canvas.addEventListener('touchcancel', stopDrag);

        // --- Export logic ---
        document.getElementById('btn-download').onclick = () => {
            if (!currentImage) return;
            const tempSelected = selectedTextIndex;
            selectedTextIndex = -1; // Hide selection box before saving
            renderCanvas();
            
            // Wait slightly for canvas to render without selection box
            setTimeout(() => {
                const link = document.createElement('a');
                link.download = `SLA-Report-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                
                // Restore selection box
                selectedTextIndex = tempSelected;
                renderCanvas();
            }, 100);
        };

        document.getElementById('btn-copy-img').onclick = () => {
            if (!currentImage) return;
            const tempSelected = selectedTextIndex;
            selectedTextIndex = -1; // Hide selection box before copying
            renderCanvas();
            
            setTimeout(() => {
                canvas.toBlob(blob => {
                    const data = [new ClipboardItem({ [blob.type]: blob })];
                    navigator.clipboard.write(data).then(() => showToast("คัดลอกรูปลง Clipboard แล้ว"));
                    
                    // Restore selection box
                    selectedTextIndex = tempSelected;
                    renderCanvas();
                });
            }, 100);
        };
    </script>
</body>
</html>
