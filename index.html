<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA Master Pro - ระบบตกแต่งรูปภาพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-indigo: #5856D6;
            --ios-red: #FF3B30;
            --ios-bg: #F2F2F7;
            --ios-glass: rgba(255, 255, 255, 0.25);
            --ios-glass-border: rgba(255, 255, 255, 0.6);
            --ios-glass-highlight: inset 0 1px 1px rgba(255, 255, 255, 0.9), inset 0 -1px 1px rgba(255, 255, 255, 0.2);
        }

        /* iOS Modern Dynamic Background */
        body {
            font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #d1d9e6;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(88, 86, 214, 0.25) 0%, transparent 50%), 
                radial-gradient(circle at 90% 20%, rgba(52, 199, 89, 0.2) 0%, transparent 50%), 
                radial-gradient(circle at 50% 80%, rgba(0, 122, 255, 0.25) 0%, transparent 60%),
                radial-gradient(circle at 80% 90%, rgba(255, 59, 48, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.5) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #1c1c1e;
            scroll-behavior: smooth;
        }

        /* iOS Ultra-Glass Panel */
        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0.15) 100%);
            backdrop-filter: blur(60px) saturate(250%);
            -webkit-backdrop-filter: blur(60px) saturate(250%);
            border: 1px solid var(--ios-glass-border);
            border-top-color: rgba(255, 255, 255, 0.9);
            border-left-color: rgba(255, 255, 255, 0.9);
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.1),
                var(--ios-glass-highlight);
            border-radius: 2.5rem; /* Apple Squircle */
        }

        /* Clean Canvas Area */
        #canvas-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.2) 100%);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 2px dashed rgba(0, 122, 255, 0.4);
            border-radius: 2rem;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05), var(--ios-glass-highlight);
        }

        #canvas-container.dragover {
            border-color: var(--ios-blue);
            background-color: rgba(0, 122, 255, 0.05);
            transform: scale(1.01);
        }

        /* iOS Control Center Style Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 28px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15), 0 1px 2px rgba(0,0,0,0.1);
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 999px;
            transition: background 0.2s;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        input[type=range]:focus::-webkit-slider-runnable-track {
            background: rgba(0, 122, 255, 0.15);
        }

        /* Modern Color Picker */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 2px;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* iOS Button Interaction */
        .ios-btn {
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .ios-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }
        .ios-btn:active {
            transform: scale(0.96);
            filter: brightness(0.95);
        }
    </style>
</head>
<body class="py-10 px-4 sm:px-8">

    <div class="max-w-6xl mx-auto">
        <!-- Section 1: Image Editor -->
        <main class="space-y-8 fade-in" style="animation-delay: 0.1s;">
            <div class="glass-panel p-6 sm:p-10">
                
                <!-- Shift Buttons (iOS System Colors) -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <button onclick="addText('กะ A 05.00 - 14.00')" class="ios-btn group relative overflow-hidden bg-[#007AFF] text-white p-6 rounded-[2rem] shadow-lg shadow-[#007AFF]/30 border border-white/20">
                        <div class="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent opacity-50"></div>
                        <div class="relative z-10 text-[11px] font-semibold text-blue-100 tracking-widest mb-1 opacity-80">SHIFT A</div>
                        <div class="relative z-10 text-lg sm:text-xl font-bold tracking-tight">05.00 - 14.00</div>
                    </button>
                    <button onclick="addText('กะ B 14.00 - 23.00')" class="ios-btn group relative overflow-hidden bg-[#34C759] text-white p-6 rounded-[2rem] shadow-lg shadow-[#34C759]/30 border border-white/20">
                        <div class="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent opacity-50"></div>
                        <div class="relative z-10 text-[11px] font-semibold text-green-100 tracking-widest mb-1 opacity-80">SHIFT B</div>
                        <div class="relative z-10 text-lg sm:text-xl font-bold tracking-tight">14.00 - 23.00</div>
                    </button>
                    <button onclick="addText('กะ C 00.00 - 05.00')" class="ios-btn group relative overflow-hidden bg-[#5856D6] text-white p-6 rounded-[2rem] shadow-lg shadow-[#5856D6]/30 border border-white/20">
                        <div class="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent opacity-50"></div>
                        <div class="relative z-10 text-[11px] font-semibold text-indigo-100 tracking-widest mb-1 opacity-80">SHIFT C</div>
                        <div class="relative z-10 text-lg sm:text-xl font-bold tracking-tight">00.00 - 05.00</div>
                    </button>
                    <button onclick="addText('กะ M 10.00 - 19.00')" class="ios-btn group relative overflow-hidden bg-[#FF3B30] text-white p-6 rounded-[2rem] shadow-lg shadow-[#FF3B30]/30 border border-white/20">
                        <div class="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent opacity-50"></div>
                        <div class="relative z-10 text-[11px] font-semibold text-red-100 tracking-widest mb-1 opacity-80">SHIFT M</div>
                        <div class="relative z-10 text-lg sm:text-xl font-bold tracking-tight">10.00 - 19.00</div>
                    </button>
                </div>

                <!-- Custom Text Input (iOS Pill) -->
                <div class="flex flex-col sm:flex-row gap-3 mb-10 p-2 bg-white/30 backdrop-blur-2xl rounded-[2rem] border border-white/60 shadow-[0_8px_32px_0_rgba(0,0,0,0.05)] shadow-sm">
                    <input type="text" id="custom-text-input" placeholder="พิมพ์ข้อความที่ต้องการเพิ่ม..." class="flex-1 px-6 py-4 rounded-[1.5rem] border-none bg-white/40 focus:outline-none focus:bg-white/60 text-[#1c1c1e] font-semibold placeholder-slate-500 transition-colors shadow-inner" onkeypress="if(event.key === 'Enter') applyCustomText()">
                    <button onclick="applyCustomText()" class="ios-btn px-8 py-4 bg-[#1c1c1e]/90 backdrop-blur-md text-white rounded-[1.5rem] font-bold shadow-md flex items-center justify-center gap-2 whitespace-nowrap border border-white/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" /></svg>
                        เพิ่ม
                    </button>
                </div>

                <!-- Toolbars (iOS Control Center feel) -->
                <div class="flex flex-col lg:flex-row items-center gap-8 pt-8 border-t border-[rgba(0,0,0,0.05)]">
                    
                    <!-- Left Tools (Settings Widgets) -->
                    <div class="w-full lg:flex-1 grid grid-cols-[auto_1fr] gap-4 items-center">
                        <!-- Color Picker Widget -->
                        <div class="bg-white/40 backdrop-blur-2xl p-3 rounded-3xl border border-white/60 shadow-[0_8px_32px_0_rgba(0,0,0,0.05)] flex flex-col items-center justify-center h-[90px] w-[90px]">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">สี</label>
                            <input type="color" id="text-color" value="#007AFF">
                        </div>
                        
                        <!-- Font Size Widget -->
                        <div class="bg-white/40 backdrop-blur-2xl p-5 rounded-3xl border border-white/60 shadow-[0_8px_32px_0_rgba(0,0,0,0.05)] h-[90px] flex flex-col justify-center relative">
                            <div class="flex justify-between items-center mb-3">
                                <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider flex items-center gap-1.5">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3M9 11v10M15 11v10M5 11h14M5 15h14" /></svg>
                                    ขนาดตัวอักษร
                                </label>
                                <span id="font-size-val" class="text-xs font-bold text-[#007AFF] bg-white/70 shadow-sm px-2.5 py-1 rounded-full border border-white">80px</span>
                            </div>
                            <input type="range" id="font-size" min="30" max="250" value="80">

                            <!-- Floating Edit/Delete Actions (Shows when text is selected) -->
                            <div id="selected-actions" class="absolute -top-12 right-0 hidden gap-2">
                                <button id="btn-edit-text" class="ios-btn p-3 bg-white/60 backdrop-blur-2xl text-[#007AFF] rounded-full shadow-lg border border-white/80" title="แก้ไข">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                </button>
                                <button id="btn-delete-text" class="ios-btn p-3 bg-white/60 backdrop-blur-2xl text-[#FF3B30] rounded-full shadow-lg border border-white/80" title="ลบ">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Right Action Buttons -->
                    <div class="flex flex-wrap gap-3 w-full lg:w-auto h-[90px] items-center">
                        <button id="btn-file-trigger" class="ios-btn flex-1 lg:flex-none h-full px-6 bg-white/40 backdrop-blur-2xl border border-white/60 text-slate-700 hover:bg-white/60 rounded-3xl font-bold shadow-[0_8px_32px_0_rgba(0,0,0,0.05)] flex flex-col items-center justify-center gap-1.5">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-[#007AFF]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                            <span class="text-[11px] uppercase tracking-wider">เลือกรูป</span>
                        </button>
                        <input type="file" id="file-input" class="hidden" accept="image/*">
                        
                        <button id="btn-clear" class="ios-btn h-full px-5 bg-white/40 backdrop-blur-2xl border border-white/60 text-slate-500 hover:text-[#FF3B30] hover:bg-white/60 rounded-3xl shadow-[0_8px_32px_0_rgba(0,0,0,0.05)] flex flex-col items-center justify-center gap-1.5" title="ล้างภาพทั้งหมด">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            <span class="text-[11px] uppercase tracking-wider">ล้าง</span>
                        </button>

                        <button id="btn-copy-img" class="ios-btn flex-1 lg:w-[120px] h-full bg-[#1c1c1e]/90 backdrop-blur-xl border border-white/20 text-white rounded-3xl font-bold shadow-md flex flex-col items-center justify-center gap-1.5">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                            <span class="text-[11px] uppercase tracking-wider text-slate-300">คัดลอก</span>
                        </button>
                        
                        <button id="btn-download" class="ios-btn flex-1 lg:w-[120px] h-full bg-[#007AFF]/90 backdrop-blur-xl border border-white/20 text-white rounded-3xl font-bold shadow-lg shadow-[#007AFF]/30 flex flex-col items-center justify-center gap-1.5">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                            <span class="text-[11px] uppercase tracking-wider text-blue-100">บันทึก</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Hint Text -->
            <div class="text-center text-sm font-medium text-slate-500/80">
                คลิกที่ข้อความเพื่อลากย้าย • <strong class="text-slate-600">ดับเบิ้ลคลิก</strong> เพื่อแก้ไขหรือลบ
            </div>

            <!-- Canvas Area -->
            <div id="canvas-container" class="relative overflow-hidden min-h-[450px] flex items-center justify-center group">
                <div id="placeholder-text" class="text-center p-12 transition-transform duration-400 group-hover:scale-105">
                    <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 text-[#007AFF]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    </div>
                    <p class="text-2xl font-bold text-slate-800 mb-2 tracking-tight">วางรูปภาพ (Ctrl+V)</p>
                    <p class="text-slate-500 font-medium">หรือลากไฟล์มาวางบริเวณนี้</p>
                </div>
                <canvas id="editor-canvas" class="hidden cursor-crosshair max-w-full h-auto rounded-[2rem]" style="touch-action: none;"></canvas>
            </div>
        </main>

        <!-- Dynamic Island / Toast Notification -->
        <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 px-6 py-4 bg-[#1c1c1e]/95 backdrop-blur-xl text-white rounded-[2rem] shadow-2xl opacity-0 transform -translate-y-8 transition-all duration-400 pointer-events-none font-bold z-50 flex items-center gap-3 border border-white/10">
            <div id="toast-icon" class="w-6 h-6"></div>
            <span id="toast-msg" class="tracking-wide">Success</span>
        </div>

        <!-- Edit Modal (iOS Modal Card style) -->
        <div id="edit-modal" class="fixed inset-0 z-50 hidden items-end sm:items-center justify-center bg-slate-900/30 backdrop-blur-xl transition-opacity duration-300 opacity-0">
            <div class="bg-[#F2F2F7]/80 sm:bg-white/60 backdrop-blur-3xl rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 w-full sm:w-11/12 max-w-md shadow-[0_20px_50px_rgba(0,0,0,0.2)] border border-white/60 transform translate-y-full sm:translate-y-0 sm:scale-95 transition-transform duration-400" id="edit-modal-content">
                <div class="w-12 h-1.5 bg-slate-400/50 rounded-full mx-auto mb-6 sm:hidden"></div>
                <h3 class="text-xl font-bold text-slate-800 mb-6 text-center tracking-tight">
                    แก้ไขข้อความ
                </h3>
                <input type="text" id="edit-text-input" class="w-full px-6 py-4 rounded-2xl border border-white/50 bg-white/50 backdrop-blur-md focus:outline-none focus:border-[#007AFF] focus:ring-4 focus:ring-[#007AFF]/20 shadow-inner text-slate-800 font-semibold mb-8 text-lg transition-all text-center" onkeypress="if(event.key === 'Enter') saveEditedText()">
                <div class="flex flex-col gap-3">
                    <button onclick="saveEditedText()" class="ios-btn w-full py-4 bg-[#007AFF]/90 backdrop-blur-md border border-white/20 text-white rounded-2xl font-bold text-lg shadow-md">
                        เสร็จสิ้น
                    </button>
                    <button onclick="closeEditModal()" class="ios-btn w-full py-4 bg-white/50 backdrop-blur-md text-slate-700 rounded-2xl font-bold text-lg shadow-sm border border-white/50">
                        ยกเลิก
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Core Utilities ---
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-msg').innerText = msg;
            
            icon.innerHTML = isError 
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-[#FF3B30]"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-[#34C759]"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>';

            toast.classList.remove('opacity-0', '-translate-y-8');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-8');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        // --- Image Editor Logic ---
        const canvas = document.getElementById('editor-canvas');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholder-text');
        const fileInput = document.getElementById('file-input');
        const container = document.getElementById('canvas-container');
        
        // UI Inputs
        const fontSizeInput = document.getElementById('font-size');
        const fontSizeVal = document.getElementById('font-size-val');
        const textColorInput = document.getElementById('text-color');
        const selectedActions = document.getElementById('selected-actions');
        
        let currentImage = null;
        
        // --- Array of Text Objects ---
        let texts = []; 
        let selectedTextIndex = -1;
        
        // Global defaults
        let globalColor = '#007AFF'; // Default to iOS Blue
        let globalSize = 80;

        // --- Drag Text State ---
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };

        // Handle File Input
        document.getElementById('btn-file-trigger').onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleImageFile(file);
        };

        window.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    handleImageFile(item.getAsFile());
                }
            }
        });

        container.addEventListener('dragover', (e) => { e.preventDefault(); container.classList.add('dragover'); });
        container.addEventListener('dragleave', () => container.classList.remove('dragover'));
        container.addEventListener('drop', (e) => {
            e.preventDefault();
            container.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) handleImageFile(file);
        });

        function handleImageFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    texts = []; 
                    selectedTextIndex = -1;
                    updateSelectionUI();
                    renderCanvas();
                    placeholder.classList.add('hidden');
                    canvas.classList.remove('hidden');
                    container.classList.remove('border-dashed', 'border-2'); 
                    container.style.border = 'none';
                    container.style.background = 'transparent';
                    container.style.backdropFilter = 'none';
                    container.style.boxShadow = 'none';
                    showToast("นำเข้าภาพเรียบร้อย");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function addText(text) {
            if (!currentImage) return showToast("กรุณาวางรูปภาพก่อนเพิ่มข้อความ", true);
            
            let newY = canvas.height * 0.05;
            if (texts.length > 0) {
                newY += (texts.length % 5) * (globalSize + 15);
            }

            texts.push({
                text: text,
                x: canvas.width / 2,
                y: newY,
                color: globalColor,
                size: globalSize
            });
            
            selectedTextIndex = texts.length - 1;
            updateSelectionUI();
            renderCanvas();
        }

        function applyCustomText() {
            const input = document.getElementById('custom-text-input');
            const text = input.value.trim();
            if (!text) {
                showToast("กรุณาพิมพ์ข้อความที่ต้องการก่อน", true);
                input.focus();
                return;
            }
            addText(text);
            input.value = ''; 
        }

        function updateSelectionUI() {
            if (selectedTextIndex !== -1) {
                selectedActions.classList.remove('hidden');
                selectedActions.classList.add('flex');
                
                globalSize = texts[selectedTextIndex].size;
                fontSizeInput.value = globalSize;
                fontSizeVal.innerText = `${globalSize}px`;
                
                globalColor = texts[selectedTextIndex].color;
                textColorInput.value = globalColor;
            } else {
                selectedActions.classList.add('hidden');
                selectedActions.classList.remove('flex');
            }
        }

        // --- Handle Settings Updates ---
        textColorInput.oninput = (e) => {
            globalColor = e.target.value;
            if (selectedTextIndex !== -1) {
                texts[selectedTextIndex].color = globalColor;
                renderCanvas();
            }
        };

        fontSizeInput.oninput = (e) => {
            globalSize = parseInt(e.target.value);
            fontSizeVal.innerText = `${globalSize}px`;
            if (selectedTextIndex !== -1) {
                texts[selectedTextIndex].size = globalSize;
                renderCanvas();
            }
        };

        function renderCanvas() {
            if (!currentImage) return;
            canvas.width = currentImage.width;
            canvas.height = currentImage.height;
            ctx.drawImage(currentImage, 0, 0);

            texts.forEach((t, i) => {
                ctx.font = `800 ${t.size}px Sarabun, -apple-system, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                
                ctx.strokeStyle = 'white';
                ctx.lineWidth = t.size * 0.18;
                ctx.lineJoin = 'round';
                ctx.strokeText(t.text, t.x, t.y);

                ctx.fillStyle = t.color; 
                ctx.fillText(t.text, t.x, t.y);

                if (i === selectedTextIndex) {
                    const metrics = ctx.measureText(t.text);
                    const w = metrics.width;
                    const h = t.size;
                    
                    ctx.save();
                    ctx.strokeStyle = 'rgba(0, 122, 255, 0.8)'; // iOS Blue
                    ctx.lineWidth = Math.max(4, canvas.width * 0.003);
                    
                    // Solid rounded rect instead of dashed for a more modern selection feel
                    ctx.beginPath();
                    ctx.roundRect(t.x - w/2 - 25, t.y - 15, w + 50, h + 30, 20);
                    ctx.stroke();
                    
                    // Add corner dots
                    ctx.fillStyle = '#007AFF';
                    const padX = w/2 + 25;
                    const padY = 15;
                    const corners = [
                        {x: t.x - padX, y: t.y - padY},
                        {x: t.x + padX, y: t.y - padY},
                        {x: t.x - padX, y: t.y + h + padY},
                        {x: t.x + padX, y: t.y + h + padY}
                    ];
                    corners.forEach(c => {
                        ctx.beginPath();
                        ctx.arc(c.x, c.y, ctx.lineWidth * 1.5, 0, Math.PI*2);
                        ctx.fill();
                        ctx.strokeStyle = 'white';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    });
                    
                    ctx.restore();
                }
            });
        }

        document.getElementById('btn-clear').onclick = () => {
            currentImage = null; 
            texts = [];
            selectedTextIndex = -1;
            updateSelectionUI();
            canvas.classList.add('hidden'); 
            placeholder.classList.remove('hidden');
            
            // Restore container styling
            container.style.border = '';
            container.classList.add('border-dashed', 'border-2');
            container.style.background = '';
            container.style.backdropFilter = '';
            container.style.boxShadow = '';
            
            showToast("ล้างข้อมูลแล้ว");
        };

        // --- Edit and Delete Actions ---
        const editModal = document.getElementById('edit-modal');
        const editModalContent = document.getElementById('edit-modal-content');
        const editTextInput = document.getElementById('edit-text-input');

        function promptEditText() {
            if (selectedTextIndex === -1) return;
            editTextInput.value = texts[selectedTextIndex].text;
            
            editModal.classList.remove('hidden');
            editModal.classList.add('flex');
            
            setTimeout(() => {
                editModal.classList.remove('opacity-0');
                if(window.innerWidth >= 640) {
                    editModalContent.classList.remove('scale-95');
                } else {
                    editModalContent.classList.remove('translate-y-full');
                }
                editTextInput.focus();
                // Select all text for easy replacement
                editTextInput.setSelectionRange(0, editTextInput.value.length);
            }, 10);
        }

        function closeEditModal() {
            editModal.classList.add('opacity-0');
            if(window.innerWidth >= 640) {
                editModalContent.classList.add('scale-95');
            } else {
                editModalContent.classList.add('translate-y-full');
            }
            setTimeout(() => {
                editModal.classList.add('hidden');
                editModal.classList.remove('flex');
            }, 400);
        }

        function saveEditedText() {
            if (selectedTextIndex === -1) return;
            const newText = editTextInput.value.trim();
            
            if (newText === "") {
                deleteSelectedText();
            } else {
                texts[selectedTextIndex].text = newText;
                renderCanvas();
                showToast("อัปเดตข้อความแล้ว");
            }
            closeEditModal();
        }

        function deleteSelectedText() {
            if (selectedTextIndex === -1) return;
            texts.splice(selectedTextIndex, 1);
            selectedTextIndex = -1;
            updateSelectionUI();
            renderCanvas();
            showToast("ลบข้อความแล้ว");
        }

        document.getElementById('btn-edit-text').onclick = promptEditText;
        document.getElementById('btn-delete-text').onclick = deleteSelectedText;

        // --- Drag Text Implementation ---
        function getCanvasPos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX = evt.clientX;
            let clientY = evt.clientY;
            
            if (evt.touches && evt.touches.length > 0) {
                clientX = evt.touches[0].clientX;
                clientY = evt.touches[0].clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function getHitText(pos) {
            for (let i = texts.length - 1; i >= 0; i--) {
                const t = texts[i];
                ctx.font = `800 ${t.size}px Sarabun, sans-serif`;
                const metrics = ctx.measureText(t.text);
                const w = metrics.width;
                const h = t.size;
                
                const pad = 30; 
                const left = t.x - (w / 2) - pad;
                const right = t.x + (w / 2) + pad;
                const top = t.y - pad;
                const bottom = t.y + h + pad;

                if (pos.x >= left && pos.x <= right && pos.y >= top && pos.y <= bottom) {
                    return i;
                }
            }
            return -1;
        }

        function startDrag(e) {
            if (texts.length === 0) return;
            const pos = getCanvasPos(e);
            const hitIdx = getHitText(pos);
            
            if (hitIdx !== -1) {
                isDragging = true;
                selectedTextIndex = hitIdx; 
                updateSelectionUI();

                dragOffset.x = texts[hitIdx].x - pos.x;
                dragOffset.y = texts[hitIdx].y - pos.y;
                canvas.style.cursor = 'grabbing';
            } else {
                if (selectedTextIndex !== -1) {
                    selectedTextIndex = -1;
                    updateSelectionUI();
                }
            }
            renderCanvas();
        }

        function doDrag(e) {
            if (texts.length === 0) return;
            const pos = getCanvasPos(e);
            
            if (!isDragging) {
                canvas.style.cursor = getHitText(pos) !== -1 ? 'grab' : 'crosshair';
                return;
            }

            if (e.type.startsWith('touch')) {
                e.preventDefault(); 
            }

            if (selectedTextIndex !== -1) {
                texts[selectedTextIndex].x = pos.x + dragOffset.x;
                texts[selectedTextIndex].y = pos.y + dragOffset.y;
                renderCanvas();
            }
        }

        function stopDrag() {
            isDragging = false;
            canvas.style.cursor = 'crosshair';
        }

        canvas.addEventListener('mousedown', startDrag);
        canvas.addEventListener('mousemove', doDrag);
        canvas.addEventListener('mouseup', stopDrag);
        canvas.addEventListener('mouseleave', stopDrag);
        
        canvas.addEventListener('dblclick', (e) => {
            const pos = getCanvasPos(e);
            const hitIdx = getHitText(pos);
            if (hitIdx !== -1) {
                selectedTextIndex = hitIdx;
                updateSelectionUI();
                promptEditText();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            if (getHitText(getCanvasPos(e)) !== -1) {
                e.preventDefault(); 
            }
            startDrag(e);
        }, { passive: false });
        canvas.addEventListener('touchmove', doDrag, { passive: false });
        canvas.addEventListener('touchend', stopDrag);
        canvas.addEventListener('touchcancel', stopDrag);

        // --- Export logic ---
        document.getElementById('btn-download').onclick = () => {
            if (!currentImage) return;
            const tempSelected = selectedTextIndex;
            selectedTextIndex = -1; 
            renderCanvas();
            
            setTimeout(() => {
                const link = document.createElement('a');
                link.download = `SLA-Report-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                
                selectedTextIndex = tempSelected;
                renderCanvas();
            }, 100);
        };

        document.getElementById('btn-copy-img').onclick = () => {
            if (!currentImage) return;
            const tempSelected = selectedTextIndex;
            selectedTextIndex = -1; 
            renderCanvas();
            
            setTimeout(() => {
                canvas.toBlob(blob => {
                    const data = [new ClipboardItem({ [blob.type]: blob })];
                    navigator.clipboard.write(data).then(() => showToast("คัดลอกรูปลง Clipboard แล้ว"));
                    
                    selectedTextIndex = tempSelected;
                    renderCanvas();
                });
            }, 100);
        };
    </script>
</body>
</html>
